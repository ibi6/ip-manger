services:
  backend:
    build: ./backend
    container_name: ipam-backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      # 生产请设置: SECRET_KEY=$(openssl rand -hex 32)
      SECRET_KEY: ${SECRET_KEY:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      DATABASE_URL: sqlite:////data/ipam.db
      CORS_ORIGINS: http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80,http://localhost:5173,http://localhost:5175
    volumes:
      - ipam_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: ipam-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  ipam_data:
