<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" fill="none" role="img" aria-label="NetLedger 企业IP地址管理">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07131F"/>
      <stop offset="0.5" stop-color="#0B1F33"/>
      <stop offset="1" stop-color="#0F3D3A"/>
    </linearGradient>
    <linearGradient id="glow" x1="900" y1="40" x2="1240" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14B8A6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#0EA5E9" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <!-- 背景：不要在文字区域叠任何实心条 -->
  <rect width="1280" height="480" fill="url(#bg)"/>
  <circle cx="1020" cy="100" r="180" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="1160" cy="380" r="130" fill="#14B8A6" fill-opacity="0.1" filter="url(#blur)"/>

  <!-- 右侧网格（仅装饰，避开左侧文案区） -->
  <g stroke="#FFFFFF" stroke-opacity="0.05">
    <path d="M740 48v384M820 48v384M900 48v384M980 48v384M1060 48v384M1140 48v384M1220 48v384"/>
    <path d="M720 100h520M720 180h520M720 260h520M720 340h520M720 420h520"/>
  </g>

  <!-- 右侧示意卡片 -->
  <rect x="760" y="100" width="420" height="280" rx="20" fill="#0F172A" stroke="#334155" stroke-opacity="0.85"/>
  <rect x="788" y="128" width="100" height="12" rx="6" fill="#14B8A6"/>
  <rect x="788" y="156" width="200" height="8" rx="4" fill="#475569"/>
  <rect x="788" y="192" width="364" height="42" rx="12" fill="#1E293B"/>
  <rect x="804" y="204" width="72" height="18" rx="6" fill="#0F766E"/>
  <rect x="892" y="208" width="160" height="12" rx="4" fill="#64748B"/>
  <rect x="788" y="250" width="364" height="42" rx="12" fill="#1E293B"/>
  <rect x="804" y="262" width="72" height="18" rx="6" fill="#0369A1"/>
  <rect x="892" y="266" width="180" height="12" rx="4" fill="#64748B"/>
  <rect x="788" y="308" width="364" height="42" rx="12" fill="#1E293B"/>
  <rect x="804" y="320" width="72" height="18" rx="6" fill="#B45309"/>
  <rect x="892" y="324" width="140" height="12" rx="4" fill="#64748B"/>

  <!-- 左侧中文文案：纯文字，无遮挡矩形 -->
  <text x="72" y="100" fill="#5EEAD4" font-family="Microsoft YaHei, PingFang SC, Noto Sans SC, Segoe UI, sans-serif" font-size="20" font-weight="600" letter-spacing="4">NETLEDGER</text>
  <text x="72" y="168" fill="#F8FAFC" font-family="Microsoft YaHei, PingFang SC, Noto Sans SC, Segoe UI, sans-serif" font-size="44" font-weight="700">企业 IP 地址管理</text>
  <text x="72" y="218" fill="#94A3B8" font-family="Microsoft YaHei, PingFang SC, Noto Sans SC, Segoe UI, sans-serif" font-size="20">让每一条内网 IPv4 地址都有状态、责任人和操作记录</text>
  <text x="72" y="252" fill="#64748B" font-family="Microsoft YaHei, PingFang SC, Noto Sans SC, Segoe UI, sans-serif" font-size="16">子网地址池 · 分配回收 · 设备台账 · 权限审计</text>

  <!-- 按钮视觉（放在文字下方空白处） -->
  <rect x="72" y="300" width="148" height="48" rx="12" fill="#14B8A6"/>
  <text x="146" y="331" text-anchor="middle" fill="#042F2E" font-family="Microsoft YaHei, PingFang SC, Noto Sans SC, Segoe UI, sans-serif" font-size="18" font-weight="700">快速开始</text>
  <rect x="236" y="300" width="148" height="48" rx="12" fill="#1E293B" stroke="#475569"/>
  <text x="310" y="331" text-anchor="middle" fill="#E2E8F0" font-family="Microsoft YaHei, PingFang SC, Noto Sans SC, Segoe UI, sans-serif" font-size="18" font-weight="600">查看文档</text>
</svg>
